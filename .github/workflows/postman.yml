name: Run Postman Collections

on:
  push:
    branches: [main]
  pull_request:

jobs:
  run-postman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci

      - name: Create report folder
        run: mkdir -p newman-reports

      - name: Run BookingApi collection
        run: |
          npm run test:booking

      - name: Run FakeRestApi collection
        run: |
          npm run test:fakerestapi

      - name: Run StudentInfoApi collection
        run: |
          npm run test:studentinfo

      - name: Upload Newman reports
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: newman-reports

